name: Run Tests

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install

      - name: Install Playwright
        run: npx playwright install
 
      - name: Start backend
        run: |
        cd backend
        npm install
        node server.js &
 
      - name: Run tests
        run: npx playwright test
        